<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Credit Customer Payment Voucher</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#f3f4f6;
  padding:20px;
}

.container{
  max-width:1400px;
  margin:auto;
}

.card{
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

h1,h2{
  margin-bottom:20px;
  color:#111827;
}

.grid{
  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  margin-bottom:15px;
}

input,
select,
textarea{
  width:100%;
  padding:12px;
  border:1px solid #ccc;
  border-radius:5px;
}

textarea{
  resize:none;
  height:80px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:5px;
  color:white;
  cursor:pointer;
  margin-right:5px;
}

.new-btn{
  background:#2563eb;
}

.save-btn{
  background:green;
}

.edit-btn{
  background:orange;
}

.delete-btn{
  background:red;
}

.print-btn{
  background:#9333ea;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

table th,
table td{
  border:1px solid #ddd;
  padding:10px;
  text-align:left;
}

table th{
  background:#111827;
  color:white;
}

.search-box{
  margin-bottom:15px;
}

.search-box input{
  width:350px;
}

.print-area{
  display:none;
}

  /* COMPANY PRINT HEADER */
  .company-print-header {
    display:none;
    width:100%;
    padding:15px 0;
    border-bottom:1px solid #ccc;
    margin-bottom:20px;
  }
  .company-print-header-inner{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
  }
  .company-print-header .left,
  .company-print-header .center,
  .company-print-header .right{
    flex:1 1 30%;
    min-width:160px;
  }
  .company-print-header .left{
    text-align:left;
  }
  .company-print-header .center{
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }
  .company-print-header .right{
    text-align:right;
  }
  .company-print-header img {
    max-width:120px;
    max-height:80px;
    display:inline-block;
    margin-bottom:10px;
  }
  .company-print-header .company-name {
    font-size:18px;
    font-weight:700;
    margin-bottom:5px;
  }
  .company-print-header .company-address {
    font-size:14px;
    color:#444;
    white-space:pre-wrap;
  }
  .company-print-header .company-print-title {
    font-size:16px;
    font-weight:600;
    margin-top:10px;
  }

  @media print {
    .company-print-header {
      display:block !important;
    }

    body *{
      visibility:hidden;
    }
  .print-btn,
  .generate-btn,
  .pdf-btn,
  .add-btn,
  .save-btn,
  .edit-btn,
  .delete-btn,
  .reset-btn,
  .search-btn,
  .search-box,
  .form-grid,
  .button-group,
  .no-print{
    display:none !important;
  }

  .print-area,
  .print-area *{
    visibility:visible;
  }

  .print-area{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    display:block;
  }

}

</style>

</head>

<body>

<div class="container">
  <div class="company-print-header" id="companyPrintHeader"></div>

  <!-- HEADER -->

  <div class="card">

    <h1>Credit Customer Payment Voucher</h1>

    <button
      class="new-btn"
      onclick="newVoucher()"
    >
      New Credit Customer Payment Voucher
    </button>

    <br><br>

    <div class="grid">

      <input
        type="date"
        id="voucherDate"
      >

      <input
        type="text"
        id="voucherNo"
        placeholder="Voucher Number"
        readonly
      >

      <input
        type="text"
        id="customerName"
        placeholder="Customer Name"
        onkeyup="checkSubCustomer()"
      >

      <input
        type="text"
        id="remainingBalance"
        placeholder="Remaining Balance"
      >

    </div>

    <div class="grid">

      <div>

        <label>

          <input
            type="checkbox"
            id="subCustomerTick"
           
          >

          Sub Customer Available

        </label>

      </div>

      <input
        type="text"
        id="subCustomer"
        placeholder="Sub Customer"
      >

      <select id="paymentType">

        <option value="Cash">
          Cash
        </option>

        <option value="Bank">
          Bank
        </option>

      </select>

    </div>

  </div>

  <!-- PAYMENT FORM -->

  <div class="card">

    <h2>Payment Details</h2>

    <div class="grid">

      <input
        type="text"
        id="accountName"
        placeholder="Account Name"
      >

      <input
        type="number"
        id="amount"
        placeholder="Amount"
      >

    </div>

    <textarea
      id="remarks"
      placeholder="Remarks"
    ></textarea>

    <br><br>

    <button
      class="save-btn"
      onclick="saveVoucher()"
    >
      Save Voucher
    </button>

  </div>

  <!-- LIST -->

  <div class="card">

    <h2>Voucher List</h2>

    <div class="search-box">

      <input
        type="text"
        id="searchVoucher"
        placeholder="Search Voucher / Customer / Account"
        onkeyup="searchVoucherList()"
      >

      <button
        class="print-btn"
        onclick="printSearchList()"
      >
        Print Search List
      </button>

    </div>

    <table>

      <thead>

        <tr>

          <th>ID</th>
          <th>Date</th>
          <th>Voucher No</th>
          <th>Customer</th>
          <th>Sub Customer</th>
          <th>Payment Type</th>
          <th>Account</th>
          <th>Amount</th>
          <th>Remarks</th>
          <th>Action</th>

        </tr>

      </thead>

      <tbody id="voucherTable">

      </tbody>

    </table>

  </div>

  <!-- PRINT AREA -->

  <div
    class="print-area"
    id="printArea"
  ></div>

</div>

<script>

let vouchers =
JSON.parse(
  localStorage.getItem(
    "creditCustomerVouchers"
  )
) || [];

let editIndex = -1;


// AUTO VOUCHER NUMBER

function generateVoucherNumber(){

  let lastVoucher =
    localStorage.getItem(
      "lastCreditCustomerVoucherNo"
    );

  let nextNumber =
    lastVoucher
    ? Number(lastVoucher) + 1
    : 1;

  localStorage.setItem(
    "lastCreditCustomerVoucherNo",
    nextNumber
  );

  document.getElementById(
    "voucherNo"
  ).value =

    "CCPV-" +

    String(nextNumber)
    .padStart(4,"0");

}


// SUB CUSTOMER AUTO TICK

function checkSubCustomer(){

  let subCustomer =
    document.getElementById(
      "subCustomer"
    ).value;

  document.getElementById(
    "subCustomerTick"
  ).checked =
    subCustomer !== "";

}


// SAVE VOUCHER

function saveVoucher(){

  let voucher = {

    voucherDate:
      document.getElementById(
        "voucherDate"
      ).value,

    voucherNo:
      document.getElementById(
        "voucherNo"
      ).value,

    customerName:
      document.getElementById(
        "customerName"
      ).value,

    subCustomer:
      document.getElementById(
        "subCustomer"
      ).value,

    remainingBalance:
      document.getElementById(
        "remainingBalance"
      ).value,

    paymentType:
      document.getElementById(
        "paymentType"
      ).value,

    accountName:
      document.getElementById(
        "accountName"
      ).value,

    amount:
      document.getElementById(
        "amount"
      ).value,

    remarks:
      document.getElementById(
        "remarks"
      ).value

  };

  if(
    voucher.voucherDate === "" ||
    voucher.customerName === "" ||
    voucher.accountName === "" ||
    voucher.amount === ""
  ){

    alert("Fill All Fields");

    return;

  }

  if(editIndex === -1){

    vouchers.push(voucher);

  }else{

    vouchers[editIndex] =
      voucher;

    editIndex = -1;

  }

  localStorage.setItem(

    "creditCustomerVouchers",

    JSON.stringify(vouchers)

  );

  displayVouchers();

  alert("Voucher Saved");

  newVoucher();

}


// DISPLAY LIST

function displayVouchers(data = vouchers){

  let table =
    document.getElementById(
      "voucherTable"
    );

  table.innerHTML = "";

  if(data.length === 0){

    table.innerHTML = `

      <tr>

        <td colspan="10">

          No Voucher Found

        </td>

      </tr>

    `;

    return;

  }

  data.forEach((voucher,index)=>{

    table.innerHTML += `

      <tr>

        <td>${index + 1}</td>

        <td>${voucher.voucherDate}</td>

        <td>${voucher.voucherNo}</td>

        <td>${voucher.customerName}</td>

        <td>${voucher.subCustomer}</td>

        <td>${voucher.paymentType}</td>

        <td>${voucher.accountName}</td>

        <td>${voucher.amount}</td>

        <td>${voucher.remarks}</td>

        <td>

          <button
            class="edit-btn"
            onclick="editVoucher(${index})"
          >
            Edit
          </button>

          <button
            class="delete-btn"
            onclick="deleteVoucher(${index})"
          >
            Delete
          </button>

        </td>

      </tr>

    `;

  });

}


// SEARCH

function searchVoucherList(){

  let value =

    document.getElementById(
      "searchVoucher"
    )
    .value
    .toLowerCase();

  let filtered =

    vouchers.filter(voucher =>

      voucher.voucherNo
      .toLowerCase()
      .includes(value)

      ||

      voucher.customerName
      .toLowerCase()
      .includes(value)

      ||

      voucher.accountName
      .toLowerCase()
      .includes(value)

    );

  displayVouchers(filtered);

}


// EDIT

function editVoucher(index){

  let voucher =
    vouchers[index];

  document.getElementById(
    "voucherDate"
  ).value =
    voucher.voucherDate;

  document.getElementById(
    "voucherNo"
  ).value =
    voucher.voucherNo;

  document.getElementById(
    "customerName"
  ).value =
    voucher.customerName;

  document.getElementById(
    "subCustomer"
  ).value =
    voucher.subCustomer;

  document.getElementById(
    "remainingBalance"
  ).value =
    voucher.remainingBalance;

  document.getElementById(
    "paymentType"
  ).value =
    voucher.paymentType;

  document.getElementById(
    "accountName"
  ).value =
    voucher.accountName;

  document.getElementById(
    "amount"
  ).value =
    voucher.amount;

  document.getElementById(
    "remarks"
  ).value =
    voucher.remarks;

  checkSubCustomer();

  editIndex = index;

}


// DELETE

function deleteVoucher(index){

  if(confirm("Delete Voucher?")){

    vouchers.splice(index,1);

    localStorage.setItem(

      "creditCustomerVouchers",

      JSON.stringify(vouchers)

    );

    displayVouchers();

  }

}


// NEW

function newVoucher(){

  document.getElementById(
    "voucherDate"
  ).value = "";

  document.getElementById(
    "customerName"
  ).value = "";

  document.getElementById(
    "subCustomer"
  ).value = "";

  document.getElementById(
    "remainingBalance"
  ).value = "";

  document.getElementById(
    "accountName"
  ).value = "";

  document.getElementById(
    "amount"
  ).value = "";

  document.getElementById(
    "remarks"
  ).value = "";

  document.getElementById(
    "subCustomerTick"
  ).checked = false;

  editIndex = -1;

  generateVoucherNumber();

}


// PRINT SEARCH LIST

function printSearchList(){

  let rows = "";

  document
  .querySelectorAll(
    "#voucherTable tr"
  )
  .forEach(row=>{
    const cells = row.querySelectorAll("td");
    if(cells.length === 0) return;
    rows += `\n      <tr>${Array.from(cells)
      .slice(0, 8)
      .map(cell => `<td>${cell.innerHTML}</td>`)
      .join('')}</tr>`;
  });

  const companyHeader = getCompanyPrintHeaderHtml();
  document.getElementById(
    "printArea"
  ).innerHTML = `

    ${companyHeader}

    <h1>
      Credit Customer Voucher List
    </h1>

    <table
      border="1"
      width="100%"
      cellpadding="10"
      cellspacing="0"
    >

      <tr>

        <th>ID</th>
        <th>Date</th>
        <th>Voucher No</th>
        <th>Customer</th>
        <th>Sub Customer</th>
        <th>Payment Type</th>
        <th>Account</th>
        <th>Amount</th>

      </tr>

      ${rows}

    </table>

  `;

  window.print();

}


// LOAD

generateVoucherNumber();

displayVouchers();



// Add print button to page
addPrintButtonToPage('credit customer voucher');

/* COMPANY PRINT HEADER */
function getCompanyInfoForPrint() {
  try {
    return JSON.parse(localStorage.getItem('erp_company_info') || 'null') || {};
  } catch (error) {
    return {};
  }
}

function getCompanyPrintHeaderHtml(title) {
  const info = getCompanyInfoForPrint();
  const logo = info.logoDataUrl ? `<img src="${info.logoDataUrl}" alt="Company Logo">` : '';
  const name = info.companyName ? `<div class="company-name">${info.companyName}</div>` : '';
  const address = info.address ? `<div class="company-address">${info.address}</div>` : '';
  const titleHtml = title ? `<div class="company-print-title">${title}</div>` : '';
  return `\n    <div class="company-print-header">\n      <div class="company-print-header-inner">\n        <div class="left">${logo}</div>\n        <div class="center">${name}${titleHtml}</div>\n        <div class="right">${address}</div>\n      </div>\n    </div>\n  `;
}

function renderCompanyPrintHeader() {
  const header = document.getElementById('companyPrintHeader');
  if (header) {
    header.innerHTML = getCompanyPrintHeaderHtml();
    header.style.display = 'none';
  }
}

renderCompanyPrintHeader();

</script>

</body>
</html>
