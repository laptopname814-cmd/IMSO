<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Raw Material Issue Form</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f5f9;
    padding:20px;
}

.container{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.header{
    background:#003b8e;
    color:white;
    text-align:center;
    padding:15px;
    font-size:28px;
    font-weight:bold;
    border-radius:8px;
    margin-bottom:20px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-bottom:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:5px;
    font-weight:bold;
}

input{
    padding:10px;
    border:1px solid #cbd5e1;
    border-radius:5px;
}

.item-grid{
    display:grid;
    grid-template-columns:2fr 1fr auto;
    gap:10px;
    align-items:end;
    margin-bottom:20px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.add-btn{
    background:#2563eb;
    color:white;
}

.print-btn{
    background:#111827;
    color:white;
}

.edit-btn{
    background:#f59e0b;
    color:white;
}

.delete-btn{
    background:#ef4444;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th{
    background:#2563eb;
    color:white;
    padding:12px;
}

table td{
    padding:12px;
    border-bottom:1px solid #e5e7eb;
}

.no-data{
    text-align:center;
    padding:20px;
    color:#64748b;
}

.print-header{
    text-align:center;
    margin-top:20px;
    margin-bottom:20px;
}

.company-print-header{
    display:none;
    width:100%;
    border-bottom:2px solid #000;
    padding:15px 20px;
    background:white;
}

.company-print-header-inner{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.company-print-header .left,
.company-print-header .center,
.company-print-header .right{
    min-width:0;
}

.company-print-header .left,
.company-print-header .right{
    flex:1;
}

.company-print-header .center{
    flex:2;
    text-align:center;
}

.company-print-header .left{
    text-align:left;
}

.company-print-header .right{
    text-align:right;
}

.company-print-header img{
    max-height:70px;
    display:inline-block;
}

.company-print-header .company-name{
    font-size:18px;
    font-weight:bold;
}

.company-print-header .company-address{
    font-size:13px;
    color:#444;
    white-space:pre-wrap;
}

@media(max-width:768px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .item-grid{
        grid-template-columns:1fr;
    }

}

@media print{

    .no-print{
        display:none;
    }

    body{
        background:white;
        padding:0;
    }

    .container{
        box-shadow:none;
    }

    .company-print-header{
        display:block !important;
        position:fixed;
        top:0;
        left:0;
        right:0;
        z-index:999;
    }

    .container{
        margin-top:120px;
    }

}

</style>

</head>

<body>

<div class="container">

    <div class="header no-print">
        RAW MATERIAL ISSUE FORM
    </div>

    <!-- Form -->

    <div class="form-grid no-print">

        <div class="form-group">
            <label>Issue Date</label>
            <input type="date" id="issueDate">
        </div>

        <div class="form-group">
            <label>Issue To</label>
            <input type="text" id="issueTo" placeholder="Enter Person / Department">
        </div>

    </div>

    <!-- Item Form -->

    <div class="item-grid no-print">

        <div class="form-group">
            <label>Item Name</label>
            <input type="text" id="itemName" placeholder="Enter Item Name">
        </div>

        <div class="form-group">
            <label>Quantity</label>
            <input type="number" id="qty" placeholder="Enter Qty">
        </div>

        <button class="add-btn" onclick="addItem()">
            Add Item
        </button>

    </div>

    <!-- Print Header -->

    <div class="company-print-header" id="companyPrintHeader"></div>

    <div class="print-header">

        <h2>RAW MATERIAL ISSUE LIST</h2>

        <p id="printInfo"></p>

    </div>

    <div class="search-box no-print" style="margin-bottom:20px;">
        <input type="text" id="searchInput" placeholder="Search item name" oninput="searchItems()" style="width:100%; padding:10px; border:1px solid #cbd5e1; border-radius:5px;">
    </div>

    <!-- Table -->

    <table>

        <thead>

            <tr>

                <th>Sr#</th>
                <th>Item Name</th>
                <th>Qty</th>
                <th class="no-print">Action</th>

            </tr>

        </thead>

        <tbody id="itemTable">

        </tbody>

    </table>

    <!-- Buttons -->

    <div style="margin-top:20px;" class="no-print">

        <button class="print-btn" onclick="printPage()">
            Print List
        </button>

    </div>

</div>

<script>

let items = JSON.parse(localStorage.getItem("rawMaterialItems")) || [];

let editIndex = -1;


// PAGE LOAD

window.onload = function(){

    displayItems();

    renderCompanyPrintHeader();

    let savedInfo =
    JSON.parse(localStorage.getItem("issueInfo"));

    if(savedInfo){

        document.getElementById("printInfo").innerHTML = `
            <strong>Date :</strong> ${savedInfo.date}
            &nbsp;&nbsp;&nbsp;&nbsp;
            <strong>Issue To :</strong> ${savedInfo.issueTo}
        `;

    }

}


// ADD / UPDATE ITEM

function getCompanyInfoForPrint(){
    try{ return JSON.parse(localStorage.getItem('erp_company_info')||'null')||{} }catch(e){ return {} }
}

function getCompanyPrintHeaderHtml(){
    const info = getCompanyInfoForPrint();
    const logo = info.logoDataUrl ? `<img src="${info.logoDataUrl}" alt="Company Logo">` : '';
    const name = info.companyName ? `<div class="company-name">${info.companyName}</div>` : '';
    const address = info.address ? `<div class="company-address">${info.address}</div>` : '';
    return `<div class="company-print-header-inner"><div class="left">${logo}</div><div class="center">${name}</div><div class="right">${address}</div></div>`;
}

function renderCompanyPrintHeader(){
    const header = document.getElementById('companyPrintHeader');
    if(header){ header.innerHTML = getCompanyPrintHeaderHtml(); }
}

function searchItems(){
    const query = document.getElementById('searchInput').value.toLowerCase();
    displayItems(query);
}

// ADD / UPDATE ITEM

function addItem(){

    let issueDate =
    document.getElementById("issueDate").value;

    let issueTo =
    document.getElementById("issueTo").value;

    let itemName =
    document.getElementById("itemName").value;

    let qty =
    document.getElementById("qty").value;

    if(issueDate === "" ||
       issueTo === "" ||
       itemName === "" ||
       qty === ""){

        alert("Please Fill All Fields");

        return;

    }

    let item = {

        itemName:itemName,
        qty:qty

    };


    // EDIT MODE

    if(editIndex > -1){

        items[editIndex] = item;

        editIndex = -1;

    }

    // ADD MODE

    else{

        items.push(item);

    }


    // SAVE DATA

    localStorage.setItem(
        "rawMaterialItems",
        JSON.stringify(items)
    );

    localStorage.setItem(
        "issueInfo",
        JSON.stringify({

            date:issueDate,
            issueTo:issueTo

        })
    );


    // PRINT INFO

    document.getElementById("printInfo").innerHTML = `
        <strong>Date :</strong> ${issueDate}
        &nbsp;&nbsp;&nbsp;&nbsp;
        <strong>Issue To :</strong> ${issueTo}
    `;


    displayItems();


    // CLEAR FIELDS

    document.getElementById("itemName").value = "";

    document.getElementById("qty").value = "";

}


// DISPLAY ITEMS

function displayItems(searchQuery = ""){

    let table =
    document.getElementById("itemTable");

    table.innerHTML = "";

    const filteredItems = items.filter(item =>
        item.itemName.toLowerCase().includes(searchQuery)
    );

    if(filteredItems.length === 0){

        table.innerHTML = `
            <tr>

                <td colspan="4"
                class="no-data">

                    No Data Available

                </td>

            </tr>
        `;

        return;

    }


    filteredItems.forEach((item,index)=>{

        table.innerHTML += `

            <tr>

                <td>${index+1}</td>

                <td>${item.itemName}</td>

                <td>${item.qty}</td>

                <td class="no-print">

                    <button
                    class="edit-btn"
                    onclick="editItem(${index})">

                        Edit

                    </button>

                    <button
                    class="delete-btn"
                    onclick="deleteItem(${index})">

                        Delete

                    </button>

                </td>

            </tr>

        `;

    });

}


// EDIT ITEM

function editItem(index){

    document.getElementById("itemName").value =
    items[index].itemName;

    document.getElementById("qty").value =
    items[index].qty;

    editIndex = index;

}


// DELETE ITEM

function deleteItem(index){

    items.splice(index,1);

    localStorage.setItem(
        "rawMaterialItems",
        JSON.stringify(items)
    );

    displayItems();

}


// PRINT PAGE

function printPage(){

    window.print();

}

</script>

</body>
</html>
